backend:
  name: github
  repo: adamsuk/ELBantams
  branch: main

media_folder: website/public/images
public_folder: images

collections:
  - name: settings
    label: "Site Settings"
    delete: false
    files:
      - name: club
        label: "Club Details"
        file: website/public/data/club.json
        format: json
        fields:
          - { name: name, label: "Club Name", widget: string }
          - { name: tagShort, label: "Short Name", widget: string, required: false }
          - { name: tagline, label: "Tagline", widget: string }
          - { name: founded, label: "Year Founded", widget: number, value_type: int }
          - { name: email, label: "Email", widget: string }
          - name: address
            label: "Address"
            widget: object
            fields:
              - { name: line1, label: "Line 1", widget: string }
              - { name: line2, label: "Line 2", widget: string }
              - { name: postcode, label: "Postcode", widget: string }
          - { name: what3words, label: "What3Words", widget: string }
          - name: socials
            label: "Social Media"
            widget: object
            fields:
              - { name: facebook, label: "Facebook URL", widget: string }
              - { name: instagram, label: "Instagram URL", widget: string }
              - { name: twitter, label: "Twitter / X URL", widget: string }
          - { name: colours, label: "Club Colours", widget: string, required: false }
          - { name: kitDescription, label: "Kit Description", widget: string, required: false }
          - { name: badge, label: "Badge Image", widget: image, required: false }
          - name: primaryColor
            label: "Primary Colour"
            widget: select
            required: false
            options:
              - red
              - pink
              - grape
              - violet
              - indigo
              - blue
              - cyan
              - teal
              - green
              - lime
              - yellow
              - orange
          - { name: clubFeedSlug, label: "Club Feed Slug", widget: string, required: false, hint: "Slug for fulltimeCalendar club feed (e.g. east-leake)" }
          - { name: teamSlugPrefix, label: "Team Slug Prefix", widget: string, required: false, hint: "Prefix to filter teams from live feeds (e.g. east-leake-)" }
          - { name: homeBanner, label: "Home Banner (HTML)", widget: text, required: false }
          - { name: groundImage, label: "Ground Image", widget: image, required: false }
          - { name: groundImageAlt, label: "Ground Image Alt Text", widget: string, required: false }
          - name: matchdayBadges
            label: "Matchday Badges"
            widget: list
            required: false
            fields:
              - { name: label, label: "Label", widget: string }
              - name: color
                label: "Colour"
                widget: select
                options: [red, pink, grape, violet, indigo, blue, cyan, teal, green, lime, yellow, orange]
          - name: nav
            label: "Navigation Items"
            widget: list
            required: false
            fields:
              - { name: to, label: "Path", widget: string }
              - { name: label, label: "Label", widget: string }
              - { name: icon, label: "Icon Class", widget: string, hint: "Font Awesome class (e.g. fa-home)" }
          - name: about
            label: "About Sections"
            widget: list
            fields:
              - { name: icon, label: "Icon Class", widget: string, hint: "Font Awesome class (e.g. fa-futbol)" }
              - { name: title, label: "Title", widget: string }
              - { name: text, label: "Text (HTML allowed)", widget: text }
          - name: history
            label: "History Paragraphs"
            widget: list
            field: { name: paragraph, label: "Paragraph", widget: text }

      - name: teams
        label: "Teams"
        file: website/public/data/teams.json
        format: json
        fields:
          - name: sections
            label: "Sections"
            widget: list
            fields:
              - { name: id, label: "Section ID", widget: string, hint: "Unique identifier (e.g. robins, bantams)" }
              - { name: name, label: "Section Name", widget: string }
              - { name: subtitle, label: "Subtitle", widget: string }
              - { name: icon, label: "Icon Class", widget: string, hint: "Font Awesome class (e.g. fa-shield-alt)" }
              - { name: logo, label: "Section Logo", widget: image, required: false }
              - name: teams
                label: "Teams"
                widget: list
                fields:
                  - { name: name, label: "Team Name", widget: string }
                  - { name: description, label: "Description", widget: text }
                  - { name: photo, label: "Team Photo", widget: image, required: false }
                  - { name: manager, label: "Manager", widget: string }
                  - { name: coach, label: "Coach", widget: string }
                  - { name: contact, label: "Contact", widget: string }
                  - { name: managerLabel, label: "Manager Label Override", widget: string, required: false, hint: "Custom label instead of 'Manager'" }
                  - { name: coachLabel, label: "Coach Label Override", widget: string, required: false, hint: "Custom label instead of 'Coach'" }
                  - { name: slug, label: "Feed Slug", widget: string, required: false, hint: "Live feed team slug (e.g. east-leake-robins-fc)" }
                  - { name: sidebar, label: "Show in Sidebar", widget: boolean, required: false }

      - name: committee
        label: "Committee & Staff"
        file: website/public/data/committee.json
        format: json
        fields:
          - name: committee
            label: "Committee Members"
            widget: list
            fields:
              - { name: role, label: "Role", widget: string }
              - { name: name, label: "Name", widget: string }
              - { name: contact, label: "Contact", widget: string }

  - name: content
    label: "Content"
    delete: false
    files:
      - name: news
        label: "News"
        file: website/public/data/news.json
        format: json
        fields:
          - name: items
            label: "News Articles"
            widget: list
            fields:
              - { name: title, label: "Title", widget: string }
              - { name: text, label: "Summary", widget: text }
              - { name: body, label: "Full Article", widget: text, required: false }
              - { name: link, label: "Link URL", widget: string, required: false }
              - { name: linkText, label: "Link Text", widget: string, required: false }
              - name: sections
                label: "Sections Filter"
                widget: list
                required: false
                field: { name: section, label: "Section ID", widget: string }

      - name: registration
        label: "Registration Options"
        file: website/public/data/registration.json
        format: json
        fields:
          - name: items
            label: "Registration Items"
            widget: list
            fields:
              - { name: title, label: "Title", widget: string }
              - { name: icon, label: "Icon Class", widget: string, hint: "Font Awesome class (e.g. fa-user-plus)" }
              - { name: description, label: "Description", widget: text }
              - { name: link, label: "Payment Link", widget: string }
              - { name: buttonText, label: "Button Text", widget: string }

      - name: matchday
        label: "Matchday Info"
        file: website/public/data/matchday.json
        format: json
        fields:
          - name: items
            label: "Matchday Items"
            widget: list
            fields:
              - { name: icon, label: "Icon Class", widget: string, hint: "Font Awesome class (e.g. fa-map-marker-alt)" }
              - { name: title, label: "Title", widget: string }
              - { name: text, label: "Text (HTML allowed)", widget: text }

      - name: gallery
        label: "Gallery"
        file: website/public/data/gallery.json
        format: json
        fields:
          - name: items
            label: "Gallery Images"
            widget: list
            fields:
              - { name: src, label: "Image", widget: image, required: false }
              - { name: caption, label: "Caption", widget: string }
